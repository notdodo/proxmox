version: "3"

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

vars:
  PYTHON_PROJECTS:
    sh: find . -mindepth 1 -maxdepth 2 -name pyproject.toml -not -path '*/.venv/*' -exec dirname {} \; | sort | tr '\n' ' '

tasks:
  default:
    desc: Show available commands
    cmds:
      - task --list-all

  install:
    desc: Install Python dependencies
    cmds:
      - for dir in {{.PYTHON_PROJECTS}}; do (cd "$dir" && uv sync); done

  format:
    desc: Format repository code
    cmds:
      - for dir in {{.PYTHON_PROJECTS}}; do (cd "$dir" && uv run ruff format && uv run ruff check --fix); done

  format-check:
    desc: Check the code format (without modifying)
    cmds:
      - for dir in {{.PYTHON_PROJECTS}}; do (cd "$dir" && uv run ruff format --check); done

  lint:
    desc: Run lint checks
    cmds:
      - for dir in {{.PYTHON_PROJECTS}}; do (cd "$dir" && uv run ruff check); done

  type-check:
    desc: Run static type checks
    cmds:
      - for dir in {{.PYTHON_PROJECTS}}; do (cd "$dir" && uv run mypy .); done

  check:
    desc: Run formatting check, lint, and type checks
    deps: [format-check, lint, type-check]
