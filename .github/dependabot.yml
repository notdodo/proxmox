version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "12:00"
    cooldown:
      default-days: 7
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
      time: "12:00"
    groups:
      pulumi:
        dependency-type: "production"
      pulumi-dev:
        dependency-type: "development"
    cooldown:
      default-days: 7
